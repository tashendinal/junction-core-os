version: "3.9"

services:
  vision-engine:
    build:
      context: ./services/vision
    container_name: vision-engine
    network_mode: host
    restart: unless-stopped

  archive-node:
    image: junction/archive-node:latest
    container_name: archive-node
    network_mode: host
    restart: unless-stopped

  command-center:
    image: junction/command-center:latest
    container_name: command-center
    network_mode: host
    restart: unless-stopped
